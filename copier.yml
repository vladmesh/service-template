_min_copier_version: "9.0.0"
_answers_file: .copier-answers.yml
_templates_suffix: .jinja
_subdirectory: template

# Files to exclude from template (template development files)
_exclude:
  - .git
  - .git/**
  - __pycache__
  - "**/__pycache__"
  - "*.pyc"
  - .pytest_cache
  - "**/.pytest_cache"
  - .mypy_cache
  - "**/.mypy_cache"
  - .ruff_cache
  - "**/.ruff_cache"
  - .venv
  - "**/.venv"
  - node_modules
  - "**/node_modules"
  - "*.egg-info"
  - dist
  - build
  - "**/*.egg-info"
  - .coverage
  - "**/.coverage"
  # Always exclude test_service (it's for template development only)
  - services/test_service
  - services/test_service/**
  # Exclude modules that were not selected before Copier starts copying files.
  - "{% if 'tg_bot' not in modules %}services/tg_bot{% endif %}"
  - "{% if 'tg_bot' not in modules %}services/tg_bot/**{% endif %}"
  - "{% if 'notifications' not in modules %}services/notifications_worker{% endif %}"
  - "{% if 'notifications' not in modules %}services/notifications_worker/**{% endif %}"
  - "{% if 'backend' not in modules %}services/backend{% endif %}"
  - "{% if 'backend' not in modules %}services/backend/**{% endif %}"
  - "{% if 'frontend' not in modules %}services/frontend{% endif %}"
  - "{% if 'frontend' not in modules %}services/frontend/**{% endif %}"
  - "{% if 'backend' not in modules %}shared/spec{% endif %}"
  - "{% if 'backend' not in modules %}shared/spec/**{% endif %}"
  - "{% if 'backend' not in modules %}shared/shared/generated{% endif %}"
  - "{% if 'backend' not in modules %}shared/shared/generated/**{% endif %}"
  - "{% if 'backend' not in modules %}shared/shared/http_client.py{% endif %}"
  - "{% if 'backend' not in modules %}services/*/spec{% endif %}"
  - "{% if 'backend' not in modules %}services/*/spec/**{% endif %}"

# Files to skip if they already exist (preserve user modifications on update)
_skip_if_exists:
  - .env
  - .env.example
  - shared/spec/models.yaml
  - shared/spec/events.yaml
  - "services/*/src/app/**"
  - "services/*/src/controllers/**"

# ============================================================================
# Project Metadata
# ============================================================================

project_name:
  type: str
  help: "Project name (lowercase, hyphens allowed, e.g. 'my-awesome-api')"
  validator: "{% if not project_name | regex_search('^[a-z][a-z0-9_-]*$') %}Project name must be lowercase, start with a letter, and contain only letters, numbers, hyphens, and underscores{% endif %}"

project_slug:
  type: str
  default: "{{ project_name | replace('-', '_') }}"
  when: false  # Computed, not asked

project_description:
  type: str
  help: "Short project description"
  default: "A microservice project built with service-template framework"

task_description:
  type: str
  help: "Detailed task description for the developer (what to build)"
  default: ""

author_name:
  type: str
  help: "Author name"
  default: "Developer"

author_email:
  type: str
  help: "Author email"
  default: "dev@example.com"

# ============================================================================
# Module Selection
# ============================================================================

modules:
  type: str
  help: |
    Modules to include (comma-separated).
    Available: backend, tg_bot, notifications, frontend
    Example: backend,tg_bot
    Note: at least one module must be selected.
  default: "backend"
  validator: "{% if not modules or modules.strip() == '' %}At least one module must be selected{% endif %}"

# Computed list for easier iteration
modules_list:
  type: str
  default: "{{ modules.split(',') | map('trim') | list }}"
  when: false

# ============================================================================
# Technical Options
# ============================================================================

python_version:
  type: str
  help: "Python version"
  default: "3.12"
  choices:
    - "3.11"
    - "3.12"

node_version:
  type: str
  help: "Node.js version (for frontend)"
  default: "20"
  when: "{{ 'frontend' in modules }}"
